<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 250px;
            padding: 15px;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
        h3 {
            margin-top: 0;
            color: #333;
            font-size: 14px;
        }
        .status {
            padding: 8px;
            border-radius: 4px;
            margin-bottom: 10px;
            font-size: 11px;
        }
        .connected { background: #d4edda; color: #155724; }
        .disconnected { background: #f8d7da; color: #721c24; }
        .connecting { background: #fff3cd; color: #856404; }
        .settings {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #eee;
        }
        input[type="text"] {
            width: 100%;
            padding: 4px;
            margin: 5px 0;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 6px;
            margin: 5px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
        }
        button:hover { background: #0056b3; }
        button:disabled {
            background: #6c757d;
            cursor: not-allowed;
        }
        .info {
            font-size: 10px;
            color: #666;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h3>RaceMann Kart Sync</h3>
    
    <div id="status" class="status">
        Загрузка...
    </div>
    
    <div id="teamInfo" style="display: none;">
        <strong>Команда:</strong> <span id="teamName">не определена</span>
    </div>
    
    <button id="toggleConnect">Подключиться</button>
    
    <div class="settings">
        <label><strong>Настройки сервера:</strong></label>
        <input type="text" id="serverUrl" placeholder="ws://localhost:8765">
        
        <div style="margin: 8px 0;">
            <label>
                <input type="checkbox" id="autoConnect">
                Автоподключение
            </label>
        </div>
        
        <button id="saveSettings">Сохранить настройки</button>
    </div>
    
    <div class="info">
        Синхронизация статусов картов
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
